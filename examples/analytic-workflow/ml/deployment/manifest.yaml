applicationName: IntegrationTestMLDeployment
content:
  storage:
  - name: deployment-code
    connectionName: default.s3_shared
    include:
    - ml/bundle/deployment-code
  - name: deployment-workflows
    include:
    - workflows/ml_deployment_workflow.yaml
    - workflows/ml_deployment_notebook.ipynb
  - name: model-artifacts
    connectionName: default.s3_shared
    include:
    - ml/bundle/model-artifacts
  workflows:
  - workflowName: ml_deployment_workflow
    connectionName: default.workflow_serverless
stages:
  dev:
    stage: DEV
    domain:
      tags:
        purpose: smus-cicd-testing
      region: ${DEV_DOMAIN_REGION:us-east-2}
    project:
      name: dev-marketing
    environment_variables:
      S3_PREFIX: dev
  test:
    stage: TEST
    domain:
      tags:
        purpose: smus-cicd-testing
      region: ${TEST_DOMAIN_REGION:us-east-1}
    project:
      name: test-marketing
      owners:
      - Eng1
      - arn:aws:iam::${AWS_ACCOUNT_ID}:role/GitHubActionsRole-SMUS-CLI-Tests
      - arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
      role:
        arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/test-marketing-role
    environment_variables:
      S3_PREFIX: test
    deployment_configuration:
      storage:
      - name: deployment-code
        connectionName: default.s3_shared
        targetDirectory: ml/bundle/deployment-code
      - name: deployment-workflows
        connectionName: default.s3_shared
        targetDirectory: ml/bundle/deployment-workflows
      - name: model-artifacts
        connectionName: default.s3_shared
        targetDirectory: ml/bundle/model-artifacts
    bootstrap:
      actions:
      - type: workflow.create
        workflowName: ml_deployment_workflow
      - type: workflow.run
        workflowName: ml_deployment_workflow
        trailLogs: true
  prod:
    stage: PROD
    domain:
      tags:
        purpose: smus-cicd-production
      region: ${PROD_DOMAIN_REGION:us-east-1}
    project:
      name: prod-marketing
    environment_variables:
      S3_PREFIX: prod
    deployment_configuration:
      storage:
      - name: deployment-code
        connectionName: default.s3_shared
        targetDirectory: ml/bundle/deployment-code
      - name: deployment-workflows
        connectionName: default.s3_shared
        targetDirectory: ml/bundle/deployment-workflows
      - name: model-artifacts
        connectionName: default.s3_shared
        targetDirectory: ml/bundle/model-artifacts
    bootstrap:
      actions:
      - type: workflow.create
        workflowName: ml_deployment_workflow
      - type: workflow.run
        workflowName: ml_deployment_workflow
        trailLogs: true
tests:
  folder: examples/analytic-workflow/ml/deployment/app_tests/
# Trigger workflow
