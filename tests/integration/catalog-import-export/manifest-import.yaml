monitoring:
  eventbridge:
    enabled: true
    eventBusName: default
    includeMetadata: true
applicationName: CatalogImportTest
content:
  storage:
    - name: code
      include:
        - code
  catalog:
    enabled: true    # Simple boolean - export ALL project-owned resources
    # skipPublish defaults to false — publishes resources that were published in source
    assets:
      access: []     # Only for subscription requests (unchanged)

stages:
  dev:
    stage: DEV
    domain:
      tags:
        purpose: smus-cicd-import-export
      region: ${DEV_DOMAIN_REGION}
    project:
      name: admin-project-592756948959
      owners:
      - arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
      role:
        arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
  test:
    stage: TEST
    domain:
      tags:
        purpose: smus-cicd-import-export
      region: ${DEV_DOMAIN_REGION}
    project:
      name: admin-project-592756948959
      owners:
      - arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
      role:
        arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
    deployment_configuration:
      storage:
        - name: code
          connectionName: default.s3_shared
      catalog:
        disable: false
  test-publish:
    stage: TEST
    domain:
      tags:
        purpose: smus-cicd-import-export
      region: ${DEV_DOMAIN_REGION}
    project:
      name: admin-project-592756948959
      owners:
      - arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
      role:
        arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
    deployment_configuration:
      catalog:
        disable: false
  test-disabled:
    stage: TEST
    domain:
      tags:
        purpose: smus-cicd-import-export
      region: ${DEV_DOMAIN_REGION}
    project:
      name: admin-project-592756948959
      owners:
      - arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
      role:
        arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/Admin
    deployment_configuration:
      catalog:
        disable: true
