name: Translate Documentation

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    environment: dev-aws-account
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need 2 commits to check for changes

      - name: Check for changes in README or docs
        id: check-changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 HEAD | grep -E '^(README\.md|docs/)'; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Configure AWS credentials
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1
          role-session-name: translate-docs-session

      - name: Translate README
        if: steps.check-changes.outputs.has-changes == 'true'
        
        run: |
          python docs/scripts/translate-readme-chunked.py

      - name: Fix Hebrew code blocks
        if: steps.check-changes.outputs.has-changes == 'true'
        
        run: |
          python docs/scripts/fix-hebrew-code-blocks.py

      - name: Commit translations
        if: steps.check-changes.outputs.has-changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/langs/
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            BRANCH="chore/auto-translate-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "chore: auto-translate README to multiple languages [skip ci]"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: auto-translate README to multiple languages" \
              --body "Automated translation update triggered by changes to README or docs." \
              --base main \
              --head "$BRANCH"
          fi
