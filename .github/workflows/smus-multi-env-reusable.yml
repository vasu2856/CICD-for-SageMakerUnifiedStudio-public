name: SMUS Multi-Environment Deploy (Reusable)

on:
  workflow_call:
    inputs:
      manifest_path:
        description: 'Path to manifest file'
        required: false
        type: string
        default: 'manifest.yaml'
      
      test_target:
        description: 'Test environment target name'
        required: false
        type: string
        default: 'test'
      
      prod_target:
        description: 'Production environment target name'
        required: false
        type: string
        default: 'prod'
      
      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
      
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
      
      skip_tests:
        description: 'Skip test execution'
        required: false
        type: boolean
        default: false
      
      deploy_to_prod:
        description: 'Deploy to production after test'
        required: false
        type: boolean
        default: true
      
      skip_bundle:
        description: 'Skip bundle step'
        required: false
        type: boolean
        default: false
    
    secrets:
      AWS_ROLE_ARN_DEV:
        description: 'AWS IAM Role ARN for dev account'
        required: true
      AWS_ROLE_ARN_TEST:
        description: 'AWS IAM Role ARN for test account'
        required: true
      AWS_ROLE_ARN_PROD:
        description: 'AWS IAM Role ARN for prod account'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  bundle:
    name: Bundle Application
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_bundle }}
    environment: dev-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CI/CD CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-bundle-session
      
      - name: aws-smus-cicd-cli describe (validate dev target)
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 Validating dev target"
          
          aws-smus-cicd-cli describe --manifest ${{ inputs.manifest_path }} --targets dev --connect
      
      - name: aws-smus-cicd-cli bundle from dev
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 DOMAIN_REGION: $DOMAIN_REGION"
          echo "🔍 DEV_DOMAIN_REGION: $DEV_DOMAIN_REGION"
          BUNDLE_DIR="${{ runner.temp }}/smus-bundles-${{ github.run_id }}"
          mkdir -p "$BUNDLE_DIR"
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> $GITHUB_ENV
          
          aws-smus-cicd-cli bundle \
            --manifest ${{ inputs.manifest_path }} \
            --targets dev \
            --output-dir "$BUNDLE_DIR"
      
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-bundle
          path: ${{ env.BUNDLE_DIR }}/*.zip
          if-no-files-found: error

  validate:
    name: Validate Manifest
    runs-on: ubuntu-latest
    needs: bundle
    if: always()
    environment: test-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CI/CD CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-validate-session
      
      - name: aws-smus-cicd-cli describe (validate all targets)
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 DOMAIN_REGION: $DOMAIN_REGION"
          echo "🔍 TEST_DOMAIN_REGION: $TEST_DOMAIN_REGION"
          echo "🔍 AWS_REGION: $AWS_REGION"
          
          aws-smus-cicd-cli describe --manifest ${{ inputs.manifest_path }} --connect

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: validate
    environment: test-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download bundle artifact
        if: ${{ !inputs.skip_bundle }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-bundle
          path: ${{ runner.temp }}/smus-bundles-${{ github.run_id }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CI/CD CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-deploy-test-session
       
      - name: aws-smus-cicd-cli describe (validate test target)
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 Validating test target: ${{ inputs.test_target }}"
          
          aws-smus-cicd-cli describe --manifest ${{ inputs.manifest_path }} --targets ${{ inputs.test_target }} --connect
      
      - name: aws-smus-cicd-cli deploy to test
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 DOMAIN_REGION: $DOMAIN_REGION"
          echo "🔍 TEST_DOMAIN_REGION: $TEST_DOMAIN_REGION"
          BUNDLE_FILE=$(ls ${{ runner.temp }}/smus-bundles-${{ github.run_id }}/*.zip 2>/dev/null | head -1 || echo "")
          if [ -n "$BUNDLE_FILE" ]; then
            echo "🔍 Using bundle: $BUNDLE_FILE"
            BUNDLE_ARG="--bundle-archive-path $BUNDLE_FILE"
          else
            echo "🔍 No bundle found, deploying without bundle"
            BUNDLE_ARG=""
          fi
          
          aws-smus-cicd-cli deploy \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.test_target }} \
            $BUNDLE_ARG

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: deploy-test
    if: ${{ !inputs.skip_tests }}
    environment: test-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CI/CD CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-test-session
      
      - name: aws-smus-cicd-cli test
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 DOMAIN_REGION: $DOMAIN_REGION"
          echo "🔍 TEST_DOMAIN_REGION: $TEST_DOMAIN_REGION"
          
          aws-smus-cicd-cli test \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.test_target }}

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-test, test]
    if: ${{ inputs.deploy_to_prod && (success() || inputs.skip_tests) }}
    environment: prod-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download bundle artifact
        if: ${{ !inputs.skip_bundle }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-bundle
          path: ${{ runner.temp }}/smus-bundles-${{ github.run_id }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CI/CD CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-deploy-prod-session
      
      - name: aws-smus-cicd-cli describe (validate prod target)
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 Validating prod target: ${{ inputs.prod_target }}"
          
          aws-smus-cicd-cli describe --manifest ${{ inputs.manifest_path }} --targets ${{ inputs.prod_target }} --connect
      
      - name: aws-smus-cicd-cli deploy to production
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 DOMAIN_REGION: $DOMAIN_REGION"
          echo "🔍 PROD_DOMAIN_REGION: $PROD_DOMAIN_REGION"
          BUNDLE_FILE=$(ls ${{ runner.temp }}/smus-bundles-${{ github.run_id }}/*.zip 2>/dev/null | head -1 || echo "")
          if [ -n "$BUNDLE_FILE" ]; then
            echo "🔍 Using bundle: $BUNDLE_FILE"
            BUNDLE_ARG="--bundle-archive-path $BUNDLE_FILE"
          else
            echo "🔍 No bundle found, deploying without bundle"
            BUNDLE_ARG=""
          fi
          
          aws-smus-cicd-cli deploy \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.prod_target }} \
            $BUNDLE_ARG
