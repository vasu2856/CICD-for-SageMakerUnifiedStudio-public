name: Test Destroy Command (Dashboard Glue QuickSight)

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'src/**'
      - '.github/workflows/test-destroy-command.yml'
  workflow_dispatch:

concurrency:
  group: test-destroy-command-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-and-destroy:
    name: Deploy → Destroy → Verify
    runs-on: ubuntu-latest
    environment: test-aws-account

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials (test)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-destroy-test-session

      - name: Register AWS CLI model patch
        run: |
          aws configure add-model \
            --service-model file://src/smus_cicd/resources/mwaaserverless-2024-07-26.normal-edited-2.json \
            --service-name mwaaserverless-internal

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Setup QuickSight source dashboard
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          python examples/analytic-workflow/dashboard-glue-quick/quicksight/setup_test_dashboard.py

      - name: Bundle from local filesystem
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          BUNDLE_DIR="${{ runner.temp }}/smus-bundles-${{ github.run_id }}"
          mkdir -p "$BUNDLE_DIR"
          aws-smus-cicd-cli bundle \
            --manifest examples/analytic-workflow/dashboard-glue-quick/manifest.yaml \
            --targets test \
            --local \
            --output-dir "$BUNDLE_DIR"
          echo "BUNDLE_FILE=$(ls $BUNDLE_DIR/*.zip | head -1)" >> $GITHUB_ENV

      - name: Deploy to test
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          aws-smus-cicd-cli deploy \
            --manifest examples/analytic-workflow/dashboard-glue-quick/manifest.yaml \
            --targets test \
            --bundle-archive-path "$BUNDLE_FILE"

      - name: Run workflow and wait for completion
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          aws-smus-cicd-cli run \
            --workflow covid_dashboard_glue_quick_pipeline \
            --targets test \
            --manifest examples/analytic-workflow/dashboard-glue-quick/manifest.yaml

      - name: Destroy all resources
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          aws-smus-cicd-cli destroy \
            --manifest examples/analytic-workflow/dashboard-glue-quick/manifest.yaml \
            --targets test \
            --force \
            --output JSON | tee /tmp/destroy-output.json

      - name: Verify destroy output has no errors
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("/tmp/destroy-output.json") as f:
              content = f.read()

          start = content.find("{")
          end = content.rfind("}") + 1
          if start < 0:
              print("ERROR: No JSON found in destroy output")
              print(content)
              sys.exit(1)

          data = json.loads(content[start:end])
          errors = [r for results in data.get("stages", {}).values() for r in results if r["status"] == "error"]
          if errors:
              print(f"ERROR: Destroy reported {len(errors)} error(s):")
              for e in errors:
                  print(f"  - {e['resource_type']} {e['resource_id']}: {e['message']}")
              sys.exit(1)

          print("✅ Destroy completed with no errors")
          for stage, results in data.get("stages", {}).items():
              counts = {}
              for r in results:
                  counts[r["status"]] = counts.get(r["status"], 0) + 1
              print(f"  {stage}: {counts}")
          EOF

      - name: Verify QuickSight resources are gone
        run: |
          python3 - <<'EOF'
          import boto3, sys, os

          account_id = boto3.client("sts").get_caller_identity()["Account"]
          region = os.environ.get("TEST_DOMAIN_REGION", "us-east-2")
          qs = boto3.client("quicksight", region_name=region)
          prefix = "deployed-test-covid-"

          dashboards = [d for d in qs.list_dashboards(AwsAccountId=account_id).get("DashboardSummaryList", []) if d["DashboardId"].startswith(prefix)]
          datasets = [d for d in qs.list_data_sets(AwsAccountId=account_id).get("DataSetSummaries", []) if d["DataSetId"].startswith(prefix)]
          sources = [s for s in qs.list_data_sources(AwsAccountId=account_id).get("DataSources", []) if s["DataSourceId"].startswith(prefix)]

          failed = any([dashboards, datasets, sources])
          if dashboards: print(f"ERROR: dashboards still exist: {[d['DashboardId'] for d in dashboards]}")
          if datasets: print(f"ERROR: datasets still exist: {[d['DataSetId'] for d in datasets]}")
          if sources: print(f"ERROR: data sources still exist: {[s['DataSourceId'] for s in sources]}")
          if failed: sys.exit(1)
          print("✅ All QuickSight resources deleted")
          EOF
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}

      - name: Verify Glue jobs are gone
        run: |
          python3 - <<'EOF'
          import boto3, sys, os

          region = os.environ.get("TEST_DOMAIN_REGION", "us-east-2")
          glue = boto3.client("glue", region_name=region)
          failed = False
          for job_name in ["setup-covid-db-job", "summary-glue-job", "set-permission-check-job"]:
              try:
                  glue.get_job(JobName=job_name)
                  print(f"ERROR: Glue job '{job_name}' still exists")
                  failed = True
              except glue.exceptions.EntityNotFoundException:
                  print(f"✅ Glue job '{job_name}' deleted")
          if failed: sys.exit(1)
          EOF
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}

      - name: Verify Airflow workflow is gone
        run: |
          python3 - <<'EOF'
          import sys, os
          sys.path.insert(0, "src")
          from smus_cicd.helpers.airflow_serverless import list_workflows, generate_workflow_name

          region = os.environ.get("TEST_DOMAIN_REGION", "us-east-2")
          wf_name = generate_workflow_name(
              bundle_name="IntegrationTestETLWorkflow",
              project_name="test-marketing",
              dag_name="covid_dashboard_glue_quick_pipeline",
          )
          remaining = [wf for wf in list_workflows(region=region) if wf["name"] == wf_name]
          if remaining:
              print(f"ERROR: Airflow workflow '{wf_name}' still exists")
              sys.exit(1)
          print(f"✅ Airflow workflow '{wf_name}' deleted")
          EOF
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}

      - name: Run idempotency check (second destroy)
        env:
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          aws-smus-cicd-cli destroy \
            --manifest examples/analytic-workflow/dashboard-glue-quick/manifest.yaml \
            --targets test \
            --force \
            --output JSON | tee /tmp/destroy-idempotency.json

          python3 - <<'EOF'
          import json, sys

          with open("/tmp/destroy-idempotency.json") as f:
              content = f.read()

          start = content.find("{")
          end = content.rfind("}") + 1
          data = json.loads(content[start:end])
          errors = [r for results in data.get("stages", {}).values() for r in results if r["status"] == "error"]
          if errors:
              print(f"ERROR: Second destroy reported {len(errors)} error(s): {errors}")
              sys.exit(1)
          print("✅ Idempotency check passed — second destroy has no errors")
          EOF
