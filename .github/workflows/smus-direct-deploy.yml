name: SMUS Direct Deploy (Reusable)

on:
  workflow_call:
    inputs:
      manifest_path:
        description: 'Path to manifest file'
        required: false
        type: string
        default: 'manifest.yaml'
      
      test_target:
        description: 'Test environment target name'
        required: false
        type: string
        default: 'test'
      
      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
      
      skip_tests:
        description: 'Skip test execution'
        required: false
        type: boolean
        default: false
      
      setup_mlflow:
        description: 'Setup MLflow tracking server infrastructure'
        required: false
        type: boolean
        default: false
    
    secrets:
      AWS_ROLE_ARN_TEST:
        description: 'AWS IAM Role ARN for test account'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    environment: test-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-deploy-test-session
      
      - name: Register AWS CLI model patch
        run: |
          aws configure add-model \
            --service-model file://src/smus_cicd/resources/mwaaserverless-2024-07-26.normal-edited-2.json \
            --service-name mwaaserverless-internal
      
      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID: $ACCOUNT_ID"
      
      - name: Setup MLflow Tracking Server
        id: mlflow-setup
        if: ${{ inputs.setup_mlflow }}
        run: |
          REGION="${{ vars.DOMAIN_REGION }}"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account-id }}"
          STACK_NAME="smus-shared-resources"
          TRACKING_SERVER_NAME="smus-integration-mlflow-${REGION}"
          
          echo "🔍 Checking for existing MLflow tracking server..."
          
          # Check if tracking server exists
          SERVER_EXISTS=$(aws sagemaker list-mlflow-tracking-servers \
            --region "$REGION" \
            --query "TrackingServerSummaries[?TrackingServerName=='$TRACKING_SERVER_NAME'].TrackingServerName" \
            --output text)
          
          if [ -n "$SERVER_EXISTS" ]; then
            echo "✅ MLflow tracking server '$TRACKING_SERVER_NAME' already exists"
            echo "tracking-server-name=$TRACKING_SERVER_NAME" >> $GITHUB_OUTPUT
          else
            echo "📦 MLflow tracking server not found, deploying CloudFormation stack..."
            
            # Deploy CloudFormation stack
            aws cloudformation deploy \
              --template-file tests/scripts/setup/idc-based-domains/5-testing-infrastructure/testing-infrastructure/shared-resources-template.yaml \
              --stack-name "$STACK_NAME" \
              --parameter-overrides \
                S3BucketName="smus-mlflow-artifacts-${ACCOUNT_ID}-${REGION}" \
                TrackingServerName="$TRACKING_SERVER_NAME" \
                TrackingServerSize="Small" \
              --capabilities CAPABILITY_NAMED_IAM \
              --region "$REGION"
            
            # Get the tracking server ARN from stack outputs
            MLFLOW_ARN=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$REGION" \
              --query 'Stacks[0].Outputs[?OutputKey==`MLflowTrackingServerArn`].OutputValue' \
              --output text)
            
            echo "✅ MLflow infrastructure deployed successfully"
            echo "   Tracking Server: $TRACKING_SERVER_NAME"
            echo "   ARN: $MLFLOW_ARN"
            echo "tracking-server-name=$TRACKING_SERVER_NAME" >> $GITHUB_OUTPUT
          fi
      
      - name: smus-cli deploy to test (direct from branch)
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          MLFLOW_TRACKING_SERVER_NAME: ${{ inputs.setup_mlflow && steps.mlflow-setup.outputs.tracking-server-name || '' }}
          MLFLOW_ARTIFACT_LOCATION: s3://amazon-sagemaker-${{ steps.aws-account.outputs.account-id }}-${{ vars.DOMAIN_REGION }}-${{ vars.PROJECT_ID }}/shared/ml/mlflow-artifacts
          STS_REGION: ${{ vars.DOMAIN_REGION }}
          STS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          echo "🚀 Deploying directly from branch to test"
          
          smus-cli deploy \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.test_target }}
      
      - name: Download workflow output notebooks
        if: always()
        continue-on-error: true
        run: |
          
          
          # Extract workflow names from manifest
          python3 << 'EOF'
          import yaml
          import sys
          
          manifest_path = "${{ inputs.manifest_path }}"
          try:
              with open(manifest_path, 'r') as f:
                  manifest = yaml.safe_load(f)
              
              app_name = manifest.get('applicationName', '')
              workflows = manifest.get('content', {}).get('workflows', [])
              
              if not workflows:
                  print("No workflows found in manifest")
                  sys.exit(0)
              
              # Get project name from test target
              project_name = "${{ inputs.test_target }}-marketing"
              
              # Download outputs for each workflow
              for workflow in workflows:
                  workflow_name = workflow.get('workflowName', '')
                  if workflow_name:
                      full_name = f"{app_name}_{project_name}_{workflow_name}"
                      print(f"📥 Downloading outputs for workflow: {full_name}")
                      
                      import subprocess
                      result = subprocess.run([
                          'python3', 'tests/scripts/download_workflow_outputs_from_xcom.py',
                          full_name,
                          '--region', '${{ vars.DOMAIN_REGION }}',
                          '--output-dir', 'tests/test-outputs/notebooks'
                      ], capture_output=True, text=True)
                      
                      if result.stdout:
                          print(result.stdout)
                      if result.stderr:
                          print(result.stderr)
                      
                      if result.returncode == 0:
                          print(f"✅ Downloaded outputs for {workflow_name}")
                      else:
                          print(f"⚠️ No outputs found for {workflow_name}")
          
          except Exception as e:
              print(f"❌ Error downloading notebooks: {e}")
              sys.exit(0)  # Don't fail the workflow
          EOF

      - name: Upload workflow output notebooks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-output-notebooks-${{ github.run_id }}
          path: tests/test-outputs/notebooks/**
          if-no-files-found: ignore
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: deploy-test
    if: ${{ !inputs.skip_tests }}
    environment: test-aws-account
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: Install SMUS CLI
        run: |
          
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-test-session
      
      - name: Register AWS CLI model patch
        run: |
          aws configure add-model \
            --service-model file://src/smus_cicd/resources/mwaaserverless-2024-07-26.normal-edited-2.json \
            --service-name mwaaserverless-internal
      
      - name: Get AWS Account ID
        id: aws-account-test
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID: $ACCOUNT_ID"
      
      - name: smus-cli test
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          MLFLOW_TRACKING_SERVER_NAME: ${{ inputs.setup_mlflow && format('smus-integration-mlflow-{0}', vars.DOMAIN_REGION) || '' }}
          MLFLOW_ARTIFACT_LOCATION: s3://amazon-sagemaker-${{ steps.aws-account-test.outputs.account-id }}-${{ vars.DOMAIN_REGION }}-${{ vars.PROJECT_ID }}/shared/ml/mlflow-artifacts
          STS_REGION: ${{ vars.DOMAIN_REGION }}
          STS_ACCOUNT_ID: ${{ steps.aws-account-test.outputs.account-id }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account-test.outputs.account-id }}
        run: |
          
          smus-cli test \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.test_target }}
