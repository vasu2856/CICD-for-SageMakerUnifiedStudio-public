name: PR Integration Tests

on:
  # pull_request:
  #   branches: [main, master]
  #   paths:
  #     - 'src/**'
  #     - 'tests/**'
  #     - '.github/workflows/pr-tests.yml'
  # push:
  #   branches: [amirbo_feature_branch]
  #   paths:
  #     - 'src/**'
  #     - 'tests/**'
  #     - '.github/workflows/pr-tests.yml'
  workflow_dispatch:

concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run unit tests with coverage
      run: |
        pytest tests/unit/ -v --tb=short --cov=src/smus_cicd --cov-report=xml --cov-report=html --junit-xml=tests/test-outputs/test-results-unit.xml
    
    - name: Upload unit test coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-unit
        path: |
          tests/test-outputs/coverage.xml
          tests/test-outputs/.coverage
          tests/test-outputs/coverage/
          tests/test-outputs/test-results-unit.xml
        retention-days: 30

  discover-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      test-dirs: ${{ steps.find-tests.outputs.test-dirs }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Find integration test directories
      id: find-tests
      run: |
        cd tests/integration
        
        # Run basic_app, connections_app, and bundle_zip_deploy tests
        test_dirs='["basic_app", "connections_app", "bundle_zip_deploy"]'
        
        echo "test-dirs=$test_dirs" >> $GITHUB_OUTPUT
        echo "Found tests: $test_dirs"

  integration-tests:
    runs-on: ubuntu-latest
    environment: dev-aws-account
    needs: discover-tests
    if: needs.discover-tests.outputs.test-dirs != '[]'
    
    strategy:
      fail-fast: false
      matrix:
        test-path: ${{ fromJson(needs.discover-tests.outputs.test-dirs) }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Generate test name
      id: test-name
      run: |
        # Convert path to safe name: basic_app -> basic-app, test_file.py -> test-file
        test_name=$(echo "${{ matrix.test-path }}" | sed 's|/|-|g' | sed 's|_|-|g' | sed 's|\.py$||')
        echo "name=$test_name" >> $GITHUB_OUTPUT
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ vars.DOMAIN_REGION }}
        role-session-name: test-${{ steps.test-name.outputs.name }}
        role-duration-seconds: 43200
    
    - name: Register AWS CLI models
      run: |
        aws configure add-model \
          --service-model file://src/smus_cicd/resources/mwaaserverless-2024-07-26.normal-edited-2.json \
          --service-name mwaaserverless-internal
    
    - name: Get AWS Account ID
      id: aws-account
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
        echo "✓ AWS Account ID: $ACCOUNT_ID"
    
    - name: Verify DataZone domain exists
      run: |
        echo "🔍 Checking DataZone domains in ${{ vars.DOMAIN_REGION }}"
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "Account: $ACCOUNT_ID"
        echo "Region: ${{ vars.DOMAIN_REGION }}"
        echo ""
        echo "Available domains:"
        aws datazone list-domains --region ${{ vars.DOMAIN_REGION }} --query 'items[].{id:id,name:name}' --output table
    
    - name: Test describe --connect with basic_app manifest
      env:
        DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
      run: |
        echo "Testing describe --connect with basic_app manifest"
        smus-cli describe --connect --targets test --manifest tests/integration/basic_app/manifest.yaml || echo "Describe failed"
    
    - name: Run test
      env:
        DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        STS_REGION: ${{ vars.DOMAIN_REGION }}
        STS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
      run: |
        test_path="tests/integration/${{ matrix.test-path }}"
        test_name="${{ steps.test-name.outputs.name }}"
        
        pytest "$test_path" -v --tb=short \
          --cov=src/smus_cicd \
          --cov-report=xml:coverage-${test_name}.xml \
          --junit-xml=test-results-${test_name}.xml || {
          echo "❌ Test failed - check test-results-${test_name}.xml for details"
          exit 1
        }
        
        [ -f tests/test-outputs/.coverage ] && cp tests/test-outputs/.coverage coverage-${test_name}.data
    
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-${{ steps.test-name.outputs.name }}
        path: |
          coverage-${{ steps.test-name.outputs.name }}.xml
          coverage-${{ steps.test-name.outputs.name }}.data
          test-results-${{ steps.test-name.outputs.name }}.xml

  test-summary:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all coverage artifacts
      uses: actions/download-artifact@v4
      with:
        path: coverage-artifacts
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install coverage tools
      run: pip install coverage pytest-html
    
    - name: Generate test summary
      run: |
        echo "# Test Results Summary" > test-summary.md
        echo "" >> test-summary.md
        
        for result in coverage-artifacts/*/test-results-*.xml; do
          if [ -f "$result" ]; then
            testname=$(basename "$result" .xml | sed 's/test-results-//')
            failures=$(grep -o 'failures="[0-9]*"' "$result" | grep -o '[0-9]*' || echo "0")
            errors=$(grep -o 'errors="[0-9]*"' "$result" | grep -o '[0-9]*' || echo "0")
            tests=$(grep -o 'tests="[0-9]*"' "$result" | grep -o '[0-9]*' || echo "0")
            
            if [ "$failures" = "0" ] && [ "$errors" = "0" ]; then
              echo "✅ **$testname**: $tests tests passed" >> test-summary.md
            else
              echo "❌ **$testname**: $failures failures, $errors errors out of $tests tests" >> test-summary.md
            fi
          fi
        done
        
        cat test-summary.md
    
    - name: Upload combined summary
      uses: actions/upload-artifact@v4
      with:
        name: test-summary-combined
        path: |
          test-summary.md
          coverage-artifacts/
        retention-days: 30
